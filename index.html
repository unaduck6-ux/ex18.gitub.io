<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Headings Demo</title>
<style>
    body {
        background-color: white;
        font-family: "Times New Roman", serif;
    }

    .container {
        width: 700px;
        background-color: #ddd;
        padding: 20px;
    }

    /* Heading 1 */
    .h1 {
        font-size: 40px;
        font-weight: bold;
        color: black;
        text-decoration: underline;
        text-decoration-thickness: 5px;
        text-underline-offset: 5px;
        display: inline-block;
        border-top: 5px solid black;
        padding-top: 5px;
    }

    /* Heading 2 */
    .h2 {
        font-size: 28px;
        font-style: italic;
        border: 3px solid yellow;
        padding: 5px;
        margin-top: 20px;
    }

    /* Heading 3 */
    .h3 {
        font-size: 24px;
        text-align: right;
        margin-top: 40px;
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="container">
    <div class="h1">This is heading 1</div>

    <div class="h2">This is heading 2</div>

    <div class="h3">This is heading 3</div>
</div>

</body>
</html>
