<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heading Styles</title>
    <style>
        h1 {
            border-top: 2px solid black;
            font-family: serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px pink;
            padding-top: 2px;
            display: inline-block;
        }
        h2 {
            border: 1px solid gold; /* 边框粗细减半 */
            padding: 1px; /* 内边距同步减小 */
            display: block;
            font-family: serif;
            font-style: italic;
            font-weight: bold;
            p.outset{outline-style:outset;}
            width: fit-content; /* 自适应内容宽度 */
        }
        h3 {
            text-align: right;
            text-decoration: underline;
            font-family: serif;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2>
    <h3>This is heading 3</h3>
</body>
</html>
